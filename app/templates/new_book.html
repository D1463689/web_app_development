{% extends "base.html" %}

{% block title %}新增書籍 - 讀書筆記本{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0"><i class="bi bi-journal-plus"></i> 新增書籍</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('main.create_book') }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label text-danger">書名 *</label>
                        <input type="text" class="form-control" id="title" name="title" required placeholder="例如：原子習慣">
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="author" class="form-label">作者</label>
                            <input type="text" class="form-control" id="author" name="author" placeholder="例如：詹姆斯·克利爾">
                        </div>
                        <div class="col-md-6">
                            <label for="category" class="form-label">分類</label>
                            <input type="text" class="form-control" id="category" name="category" placeholder="例如：自我成長、小說">
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">新增書籍</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
